<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>ZX Gift Sender</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="main-header">
        <h1> <img src="https://i.ibb.co.com/WvRRVmpX/36de33cdbab3024d1defd291fa53fe8d.jpg" class="logo-icon"> ZX GIFT SENDER</h1>
        <p>Premium Free Fire Store Interface</p>
    </header>

    <div class="login-container" id="loginBox">
        <h2>Authentication</h2>
        <input type="text" id="jwtInput" placeholder="Paste your JWT token here..." autocomplete="off">
        <button id="loadBtn">LOAD GIFT STORE</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <div class="store-container" id="storeBox" style="display: none;">
        <div class="wallet-bar">
            <div class="wallet-item"><span class="label">Diamonds</span><span class="value" id="valDiamond">--</span></div>
            <div class="wallet-item"><span class="label">Gold</span><span class="value" id="valGold">--</span></div>
            <div class="wallet-item full"><span class="label">Last Topup</span><span class="value" id="valTopup">--</span></div>
        </div>

        <div class="store-header">
            <h3>🛒 Store Catalog</h3>
            <span id="giftsSent">🎁 Sent Today: 0</span>
        </div>

        <div class="category-bar" id="categoryBar">
            <button class="cat-btn active" data-cat="All">All Items</button>
        </div>

        <div class="grid" id="itemsGrid"></div>
    </div>

    <!-- Send Gift Modal -->
    <div id="giftModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#10b981; margin-bottom:15px;"></h2>
            <input type="text" id="targetUid" placeholder="Enter Receiver UID" autocomplete="off">
            <input type="text" id="giftMsg" placeholder="Message (Optional)" value="Enjoy your gift!">
            <div class="modal-btns">
                <button id="confirmSend" class="btn-send">CONFIRM</button>
                <button onclick="closeModal()" class="btn-cancel">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
